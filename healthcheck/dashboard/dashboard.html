<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthcheck</title>
  <link rel="stylesheet" href="assets/css/bulma.min.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body>

  <nav id="hc-nav" class="navbar" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <span class="navbar-item has-text-white"><span id="logo"><span class="has-text-weight-bold">bulp</span>.io - Healthcheck</span></span>
    </div>
    <div class="navbar-end">
      <div class="navbar-item">
        <span id="hc-last-updated" class="has-text-white"></span>
      </div>

      <div class="navbar-item">
        <div class="buttons">
          <button id="hc-lang-de" class="button is-small is-light hc-lang-btn" data-i18n="German">German</button>
          <button id="hc-lang-en" class="button is-small is-light hc-lang-btn" data-i18n="English">English</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="tabs is-centered hc-tab-bar" id="hc-dashboard-tabs">
    <ul>
      <li class="is-active" data-tab="overview">
        <a data-i18n="Overview">Overview</a>
      </li>
      <li data-tab="alerts">
        <a data-i18n="PageAlertsHeadline">Alerts</a>
      </li>
      <li data-tab="devices">
        <a data-i18n="DevicesTitle">Devices</a>
      </li>
      <li data-tab="people">
        <a data-i18n="IndividualsTitle">People</a>
      </li>
      <li data-tab="rooms">
        <a data-i18n="RoomsTitle">Rooms</a>
      </li>
      <li data-tab="status">
        <a data-i18n="StatusTitle">Status</a>
      </li>
    </ul>
  </div>

  <section id="tab-overview" class="hc-tab-panel">

    <div class="columns is-multiline is-centered" id="overview-stats-cards"></div>

    <div class="columns">
      <div class="column">
        <div class="box">
          <h3 class="title is-normal mb-3" data-i18n="RecentAlerts">Recent Alerts</h3>
          <div id="overview-recent-alerts"></div>
        </div>
      </div>
    </div>

    <div class="columns" id="overview-charts">
      <div class="column is-half">
        <div class="box hc-chart-box">
          <h3 class="title is-4 mb-3" data-i18n="PageAlertsHeadline">Alerts</h3>
          <canvas id="chart-alerts-status"></canvas>
        </div>
      </div>
      <div class="column is-half">
        <div class="box hc-chart-box">
          <h3 class="title is-4 mb-3" data-i18n="DevicesTitle">Devices</h3>
          <canvas id="chart-devices-status"></canvas>
        </div>
      </div>
    </div>

  </section>

  <!-- =================================================================================== -->
  <!-- Tab panel: Alerts                                                                   -->
  <!-- =================================================================================== -->
  <section id="tab-alerts" class="hc-tab-panel is-hidden">

    <!-- Alert cards (built dynamically in dashboard.js) -->
    <div id="alerts-list"></div>

  </section>

  <!-- =================================================================================== -->
  <!-- Tab panel: Devices                                                                  -->
  <!-- =================================================================================== -->
  <section id="tab-devices" class="hc-tab-panel is-hidden">

    <!-- Device table -->
    <div class="table-container" id="devices-list">
      <table class="table is-fullwidth is-striped" id="devices-table">
        <thead>
          <tr>
            <th data-i18n="Name">Name</th>
            <th data-i18n="ProductName">Product Name</th>
            <th data-i18n="Bridge">Bridge</th>
            <th data-i18n="Status">Status</th>
            <th data-i18n="AssignedPerson">Assigned person</th>
            <th data-i18n="AssignedRoom">Assigned room</th>
            <th data-i18n="Power">Power</th>
          </tr>
        </thead>
        <tbody id="devices-table-body">
          <!-- Rows built dynamically in dashboard.js -->
        </tbody>
      </table>
    </div>

  </section>

  <!-- =================================================================================== -->
  <!-- Tab panel: People                                                                    -->
  <!-- =================================================================================== -->
  <section id="tab-people" class="hc-tab-panel is-hidden">
    <div class="columns is-multiline" id="people-list">
      <!-- Cards built dynamically in dashboard.js -->
    </div>
  </section>

  <!-- =================================================================================== -->
  <!-- Tab panel: Rooms                                                                     -->
  <!-- =================================================================================== -->
  <section id="tab-rooms" class="hc-tab-panel is-hidden">
    <div class="columns is-multiline" id="rooms-list">
      <!-- Cards built dynamically in dashboard.js -->
    </div>
  </section>

  <!-- =================================================================================== -->
  <!-- Tab panel: Status (server info + bridge connectivity from GET /info)               -->
  <!-- =================================================================================== -->
  <section id="tab-status" class="hc-tab-panel is-hidden">
    <div id="status-content">
      <!-- Built dynamically in dashboard.js -->
    </div>
  </section>

  <!-- =================================================================================== -->
  <!-- Scripts — load order matters: Chart.js first, then i18n, then the dashboard logic  -->
  <!-- =================================================================================== -->
  <script src="assets/libs/chart.umd.min.js"></script>
  <script src="assets/i18n/i18n.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
